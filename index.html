<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>家庭股票网站（最新）</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background:#f3e8ff; min-height:100vh; }
#gate { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:20px; background: linear-gradient(135deg, #4a1d6e, #7c3aed); }
#gate .box { background:#fff; padding:40px 30px; border-radius:16px; text-align:center; max-width:340px; width:100%; }
#gate h1 { font-size:22px; margin-bottom:6px; color:#4a1d6e; }
#gate p { font-size:14px; color:#666; margin-bottom:20px; }
#gate input { width:100%; padding:12px; border:2px solid #ddd; border-radius:10px; font-size:16px; text-align:center; outline:none; }
#gate input:focus { border-color:#e74c3c; }
#gate button { width:100%; margin-top:10px; padding:12px; background:#e74c3c; color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:600; }
#gate .error { color:#e74c3c; font-size:13px; margin-top:8px; display:none; }

#app { display:none; }
.topbar { background: linear-gradient(135deg, #4a1d6e, #7c3aed); color:#fff; padding:20px 16px 18px; text-align:center; }
.topbar h1 { font-size:20px; }
.topbar .sub { font-size:12px; opacity:0.7; margin-top:4px; }

.cards { padding:16px 12px; }
.card { background:#fff; border-radius:12px; padding:20px 16px; margin-bottom:14px; box-shadow:0 1px 4px rgba(0,0,0,0.06); cursor:pointer; transition:transform .15s; }
.card:active { transform:scale(0.98); }
.card .title { font-size:17px; font-weight:700; color:#4a1d6e; margin-bottom:4px; }
.card .desc { font-size:13px; color:#999; }
.card .badge { display:inline-block; padding:3px 10px; border-radius:4px; font-size:11px; font-weight:600; color:#fff; margin-top:8px; }
.badge-buy { background:#e74c3c; }
.badge-hot { background:#e67e22; }

#notice { background:#fff8e1; color:#8d6e00; padding:8px 12px; text-align:center; font-size:12px; }

.links { padding:0 12px 20px; text-align:center; }
.links a { color:#e74c3c; text-decoration:none; font-size:13px; }

.foot { text-align:center; padding:12px; font-size:11px; color:#bbb; }
</style>
</head>
<body>

<div id="gate">
  <div class="box">
    <h1>📊 家庭股票网站（最新）</h1>
    <p>请输入访问密码</p>
    <input type="password" id="pwd" placeholder="密码" autofocus>
    <button onclick="unlock()">进入</button>
    <div class="error" id="err">密码错误</div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <h1>📊 家庭股票网站（最新）</h1>
    <div class="sub" id="subtitle"></div>
  </div>
  <div id="notice"></div>
  <div class="cards">
    <div class="card" onclick="openReport('daily');">
      <div class="title">⭐ 关注股票日报</div>
      <div class="desc">技术分析 · 买卖信号 · 风险提示 · 逆回购利率</div>
      <div class="badge badge-buy" id="dailyDate">加载中...</div>
    </div>
    <div class="card" onclick="openReport('hotspot');">
      <div class="title">🔥 股市热点关注</div>
      <div class="desc">大盘指数 · 强势板块 · 涨停股 · 盘中要闻</div>
      <div class="badge badge-hot" id="hotspotDate">加载中...</div>
    </div>
  </div>
  <div class="links"><a href="archive.html">📁 历史报告</a></div>
  <div class="foot">数据：新浪/东方财富/腾讯 · AI生成仅供参考</div>
</div>

<script>
const WD = ['日','一','二','三','四','五','六'];
function fmt(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function getDates(n) {
  let r=[], t=new Date();
  for(let i=0;i<n;i++){let d=new Date(t);d.setDate(d.getDate()-i);r.push(fmt(d));}
  return r;
}

async function sha256(s){let b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}

async function unlock() {
  if (await sha256(document.getElementById('pwd').value) === await sha256('19520812')) {
    sessionStorage.setItem('sa','1');
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  } else {
    document.getElementById('err').style.display='block';
    document.getElementById('pwd').value='';
  }
}

async function exists(url){try{return(await fetch(url,{method:'HEAD'})).ok;}catch(e){return false;}}

async function initApp() {
  let now = new Date(), today = fmt(now);
  document.getElementById('subtitle').textContent = today+' 周'+WD[now.getDay()];
  let dates = getDates(6);

  let dailyDate=null, hotspotDate=null;
  for(let d of dates) {
    if(!dailyDate && await exists('daily/'+d+'.html')) dailyDate=d;
    if(!hotspotDate && await exists('hotspot/'+d+'.html')) hotspotDate=d;
  }

  document.getElementById('dailyDate').textContent = dailyDate ? '📄 '+dailyDate : '尚未生成';
  document.getElementById('hotspotDate').textContent = hotspotDate ? '📄 '+hotspotDate : '尚未生成';

  if (dailyDate && dailyDate!==today) {
    document.getElementById('notice').style.display='block';
    document.getElementById('notice').textContent = '📌 今日休市，显示最近交易日数据';
  }
}

function openReport(type) {
  let dates = getDates(6);
  // 查找最近可用报告日期
  (async ()=>{
    for(let d of dates) {
      if (await exists(type+'/'+d+'.html')) {
        window.open(type+'/'+d+'.html', '_blank'); return;
      }
    }
    alert('报告尚未生成');
  })();
}

document.getElementById('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
if (sessionStorage.getItem('sa')==='1'){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';initApp();}
</script>
</body>
</html>
